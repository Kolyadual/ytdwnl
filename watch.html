<!DOCTYPE html>
<html>
<head>
    <title>YouTube Stream Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #111; color: white; text-align: center; }
        input { width: 60%; padding: 10px; }
        button { padding: 10px 20px; }
        #player { width: 80%; margin: 20px auto; }
    </style>
</head>
<body>
    <h1>⚡ Мой YouTube-плеер</h1>
    <input type="text" id="urlInput" placeholder="Ссылка на YouTube">
    <button onclick="play()">Смотреть</button>
    <div id="player">
        <video id="video" class="video-js vjs-default-skin" controls></video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const API = 'https://youtube-watch-api-render.onrender.com/stream-url';
        function play() {
            const url = document.getElementById('urlInput').value;
            fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            })
            .then(r => r.json())
            .then(data => {
                if (data.stream_url) {
                    videojs('video').src({src: data.stream_url, type: 'video/mp4'});
                } else {
                    alert('Ошибка: ' + data.error);
                }
            });
        }
    </script>
</body>
</html>
