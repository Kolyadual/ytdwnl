<!DOCTYPE html>
<html>
<head>
    <title>YT-DLP Web Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #1a1a1a; color: #fff; font-family: Arial, sans-serif; text-align: center; }
        input { width: 60%; padding: 10px; margin: 10px; }
        button { padding: 10px 20px; background: #ff0000; color: white; border: none; cursor: pointer; }
        #player { width: 80%; max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <h1>YT-DLP Web Player</h1>
    <div>
        <input type="text" id="url" placeholder="Вставьте ссылку на видео">
        <button onclick="loadVideo()">Смотреть</button>
        <button onclick="downloadVideo()">Скачать</button>
    </div>
    <div id="player">
        <video id="video" class="video-js vjs-default-skin" controls></video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const API_BASE = 'https://youtube-watch-api-render.onrender.com';

        function loadVideo() {
            const url = document.getElementById('url').value;
            if (!url) return alert('Введите URL');

            const player = videojs('video');
            player.src({
                src: `${API_BASE}/stream`,
                type: 'video/mp4'
            });

            // Отправляем POST запрос для стриминга
            fetch(`${API_BASE}/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка загрузки видео');
                player.src({ src: URL.createObjectURL(response.blob()), type: 'video/mp4' });
                player.play();
            })
            .catch(error => alert(error.message));
        }

        function downloadVideo() {
            const url = document.getElementById('url').value;
            if (!url) return alert('Введите URL');

            fetch(`${API_BASE}/download`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка скачивания');
                return response.blob();
            })
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'video.mp4';
                a.click();
            })
            .catch(error => alert(error.message));
        }
    </script>
</body>
</html>
