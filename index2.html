<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidBee YouTube Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Скачать видео с YouTube</h1>
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Вставьте ссылку на видео...">
            <button id="fetchBtn" onclick="fetchVideoInfo()">Проверить</button>
        </div>
        <div id="info" class="info hidden">
            <p><strong id="videoTitle"></strong></p>
            <p id="videoDuration"></p>
            <div class="btn-group">
                <button onclick="downloadVideo()">Скачать видео</button>
                <button onclick="downloadAudio()">Скачать аудио</button>
            </div>
        </div>
        <div id="progress" class="progress hidden">
            <div class="progress-bar" id="progressBar"></div>
            <p id="progressText"></p>
        </div>
        <div id="downloadLink" class="download-link hidden">
            <a id="fileLink" href="#" target="_blank">Сохранить файл</a>
        </div>
        <div id="error" class="error hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
