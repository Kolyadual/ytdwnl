<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой YouTube Без Границ</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        /* Твои вчерашние классные стили */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem; }
        h1 span { color: #ff0000; }
        .subtitle { color: #aaa; margin-bottom: 1.5rem; font-size: 0.95rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="text"] {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #ff4444; }
        .watch-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: #ff0000;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1.5rem;
        }
        .watch-btn:hover { background: #cc0000; }
        .watch-btn:disabled { background: #555; cursor: not-allowed; }
        .status { text-align: center; font-size: 0.95rem; color: #ccc; min-height: 1.5rem; }
        .error { color: #ff6666; }
        .video-container {
            margin-top: 1rem;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .example { color: #888; font-size: 0.85rem; margin-top: 1.5rem; }
        a { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>▶</span> Мой YouTube без границ</h1>
        <p class="subtitle">Вставьте ссылку на любое видео и смотрите без ограничений</p>

        <label for="urlInput">Ссылка на видео</label>
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">

        <button class="watch-btn" id="watchBtn">▶️ Смотреть</button>
        
        <div class="status" id="status"></div>

        <div class="video-container" id="playerContainer" style="display: none;">
            <video id="player" controls crossorigin playsinline></video>
        </div>

        <p class="example">Пример: https://www.youtube.com/watch?v=dQw4w9WgXcQ</p>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // ⚠️ ЗАМЕНИ НА СВОЙ URL ОТ RENDER
        const API_BASE = 'https://youtube-download-api-render.onrender.com';

        // Инициализация плеера
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['quality', 'speed', 'loop'],
            quality: { default: 720, options: [4320, 2880, 2160, 1440, 1080, 720, 576, 480, 360, 240] },
            i18n: { quality: 'Качество' }
        });

        const urlInput = document.getElementById('urlInput');
        const watchBtn = document.getElementById('watchBtn');
        const statusDiv = document.getElementById('status');
        const playerContainer = document.getElementById('playerContainer');

        watchBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            // Сброс
            playerContainer.style.display = 'none';
            player.source = null;
            
            if (!url) {
                showStatus('Введите ссылку на YouTube', true);
                return;
            }
            if (!/(youtube\.com\/watch\?v=|youtu\.be\/)/i.test(url)) {
                showStatus('Похоже, это не ссылка на YouTube видео', true);
                return;
            }

            watchBtn.disabled = true;
            showStatus('Получаю прямую ссылку...');

            try {
                const response = await fetch(`${API_BASE}/api/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Ошибка сервера');
                }

                const data = await response.json();
                
                // Загружаем видео в плеер
                player.source = {
                    type: 'video',
                    sources: [
                        {
                            src: data.direct_url,
                            type: 'video/mp4',
                        },
                    ],
                };
                
                playerContainer.style.display = 'block';
                showStatus(`✅ "${data.title}" готово к просмотру!`);
            } catch (err) {
                showStatus(`Ошибка: ${err.message}`, true);
            } finally {
                watchBtn.disabled = false;
            }
        });

        function showStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.className = 'status' + (isError ? ' error' : '');
        }
    </script>
</body>
</html>
